appId: io.customer.android.sample.java_layout
tags:
  - inline
name: Inline in-app — render + position template (java_layout)
---
# Template flow. Logs in, fires a `maestro_show_inline` trigger event, and
# navigates to the Inline Examples screen; the assertions are soft by
# default (screenshot only). To make this a passing functional test, seed
# a workspace campaign:
#   - event trigger: "maestro_show_inline"
#   - action: inline in-app targeting an elementId the sample slots expose
#   - body text: includes a deterministic marker (e.g. "MAESTRO_INLINE_OK")
# Then uncomment the assertVisible lines below.

- runScript:
    file: harness/scripts/setup_run.js

- launchApp:
    clearState: true

# --- Login ---
- assertVisible:
    id: "login_button"
- tapOn:
    id: "first_name_input"
- inputText: "Maestro Inline Tester"
- hideKeyboard
- tapOn:
    id: "email_input"
- inputText: ${output.email}
- hideKeyboard
- tapOn:
    id: "login_button"

# Dismiss the identify-time welcome in-app if it appears.
- runFlow:
    when:
      visible: "Continue"
    commands:
      - tapOn: "Continue"

# Fire the inline trigger event.
- assertVisible:
    id: "custom_event_button"
- tapOn:
    id: "custom_event_button"
- extendedWaitUntil:
    visible:
      id: "event_name_input"
    timeout: 10000
- tapOn:
    id: "event_name_input"
- inputText: "maestro_show_inline"
- hideKeyboard
- tapOn:
    id: "property_name_input"
- inputText: "run_id"
- hideKeyboard
- tapOn:
    id: "property_value_input"
- inputText: ${output.run_id}
- hideKeyboard
- scrollUntilVisible:
    element:
      text: "^Send Event$"
    direction: DOWN
    timeout: 10000
- tapOn:
    id: "send_event_button"

# Backend assertion: the trigger event reached the server and kicked off a
# campaign that dispatched an in_app.
- runScript:
    file: harness/scripts/assert_message_delivered.js
    env:
      MAESTRO_EXT_API_KEY: ${MAESTRO_EXT_API_KEY}
      RUN_EMAIL: ${output.email}
      EXPECTED_TYPE: "in_app"
      MIN_METRIC: "sent"
      MAX_WAIT_MS: "30000"
# Soft-assert: tolerate failure for now (no inline-specific campaign seeded).
# Set to `assertTrue` once the workspace has the expected campaign.
# - assertTrue: ${output.assert_ok === "true"}
